        /* ============================================================

        .header {

            justify-content: space-between;

        }

<body>

    <div class="loading-overlay" id="loadingOverlay"><i class="fas fa-spinner fa-spin"></i> 載入資料中...</div>

    <div class="app">
        <!-- HEADER -->

        <!-- 牌組選擇器 -->

                <button class="btn-add-deck" id="addDeckBtn"><i class="fas fa-plus"></i> 新增</button>

            </div>
            <div class="deck-stats-mini">
                <div><span class="stat-label">總記錄：</span><span class="stat-value" id="totalMatchesDisplay">0</span><span class="stat-label"> 場 · 總勝率：</span><span class="stat-value" id="totalWinRateDisplay">0%</span></div>
            </div>
        </div>

        <!-- 區塊1：對戰記錄 -->
        <div class="section">
            <div class="card">
                <div class="card-title">

                    <span class="current-deck-indicator" id="currentDeckIndicator">載入中...</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>日期 <span class="required">*</span></label>
                        <input type="date" id="battleDate">
                    </div>
                    <div class="form-group">
                        <label>賽事 <span class="required">*</span></label>
                        <div style="display:flex; gap:0.3rem; align-items:center;">
                            <select id="eventType" style="flex:1;"></select>
                            <button class="btn-manage" id="manageEventBtn" style="padding:0.15rem 0.5rem; font-size:0.6rem; min-height:30px;"><i class="fas fa-cog"></i></button>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>對手牌組 <span class="required">*</span></label>
                        <div class="opponent-select-wrapper">

                            <button class="btn-manage" id="manageOppDeckBtn" style="padding:0.2rem 0.6rem; font-size:0.65rem;"><i class="fas fa-cog"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>結果 <span class="required">*</span></label>
                        <div class="result-btn-group" id="resultBtnGroup">
                            <button class="result-btn win" data-result="win"><i class="fas fa-check-circle fa-icon"></i> 嬴</button>
                            <button class="result-btn lose active" data-result="lose"><i class="fas fa-times-circle fa-icon"></i> 輸</button>
                            <button class="result-btn draw" data-result="draw"><i class="fas fa-minus-circle fa-icon"></i> 和</button>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>先後攻 <span class="required">*</span></label>
                        <div class="turn-btn-group" id="turnBtnGroup">
                            <button class="turn-btn" data-turn="first">⚔️ 先攻</button>
                            <button class="turn-btn" data-turn="last">🛡️ 後攻</button>
                        </div>
                    </div>
                    <div class="form-group" style="display:flex; align-items:flex-end;">
                        <div style="flex:1;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>標籤（可多選）</label>
                    <div class="tag-select-group" id="tagSelectGroup">
                        <button class="tag-select-btn tag-luck-good" data-tag="手氣好順"><span class="tag-hash">#</span>手氣好順</button>
                        <button class="tag-select-btn tag-luck-bad" data-tag="手氣好差"><span class="tag-hash">#</span>手氣好差</button>
                        <button class="tag-select-btn tag-challenge" data-tag="好有挑戰性"><span class="tag-hash">#</span>好有挑戰性</button>
                        <button class="tag-select-btn tag-weakness" data-tag="克屬"><span class="tag-hash">#</span>克屬</button>
                        <button class="tag-clear-btn" id="tagClearBtn" title="清除所有標籤"><i class="fas fa-times"></i> 清除</button>
                    </div>
                </div>

                </div>

                </div>
            </div>

        <div class="modal-overlay" id="manageMyDeckModal">

        <div class="modal-overlay" id="manageOppDeckModal">

    <script>
        // ============================================================
        // 使用 localStorage 作為資料儲存
        // ============================================================
        const STORAGE_KEY = 'pokemon_battle_data';

        // 資料結構
        let appData = {
            battles: [],
            myDecks: [],
            opponentDecks: [],
            events: ['GYM/店家賽', '高級球', '大師球', '紀念球', '個人玩', '開放賽', 'Live'],
            settings: { username: '使用者' },
            nextId: 1
        };

        // 載入資料
        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    appData = {
                        battles: parsed.battles || [],
                        myDecks: parsed.myDecks || [],
                        opponentDecks: parsed.opponentDecks || [],
                        events: parsed.events || ['GYM/店家賽', '高級球', '大師球', '紀念球', '個人玩', '開放賽', 'Live'],
                        settings: parsed.settings || { username: '使用者' },
                        nextId: parsed.nextId || 1
                    };
                }
                return true;
            } catch (e) {
                console.error('載入資料失敗:', e);
                return false;
            }
        }

        // 儲存資料
        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
                return true;
            } catch (e) {
                console.error('儲存資料失敗:', e);
                return false;
            }
        }

        // ============================================================
        // 資料操作函式
        // ============================================================
        function getBattles() {
            // 按日期降序排列（最新日期在前）
            return [...appData.battles].sort((a, b) => {
                if (a.date > b.date) return -1;
                if (a.date < b.date) return 1;
                return b.id - a.id;
            });
        }

        function getMyDecks() {
            return [...appData.myDecks];
        }

        function getOpponentDecks() {
            return [...appData.opponentDecks];
        }

        function getEvents() {
            return [...appData.events];
        }

        function getUsername() {
            return appData.settings.username || '使用者';
        }

        function setUsername(name) {
            appData.settings.username = name;
            saveData();
        }

        function addBattle(data) {
            const newBattle = {
                id: appData.nextId++,
                date: data.date,
                result: data.result,
                myTeam: data.myTeam,
                event: data.event,
                opponentDeck: data.opponentDeck,
                note: data.note || null,
                tag: data.tag || null,
                turn: data.turn || null
            };
            appData.battles.push(newBattle);
            saveData();
            return newBattle;
        }

        function deleteBattle(id) {
            appData.battles = appData.battles.filter(b => b.id !== id);
            saveData();
        }

        function addMyDeck(name) {
            if (appData.myDecks.includes(name)) return false;
            appData.myDecks.push(name);
            saveData();
            return true;
        }

        function updateMyDeck(oldName, newName) {
            const idx = appData.myDecks.indexOf(oldName);
            if (idx === -1) return;
            appData.myDecks[idx] = newName;
            appData.battles.forEach(b => {
                if (b.myTeam === oldName) b.myTeam = newName;
            });
            saveData();
        }

        function deleteMyDeck(name) {
            appData.myDecks = appData.myDecks.filter(d => d !== name);
            appData.battles = appData.battles.filter(b => b.myTeam !== name);
            saveData();
        }

        function addOpponentDeck(name) {
            if (appData.opponentDecks.includes(name)) return false;
            appData.opponentDecks.push(name);
            saveData();
            return true;
        }

        function updateOpponentDeck(oldName, newName) {
            const idx = appData.opponentDecks.indexOf(oldName);
            if (idx === -1) return;
            appData.opponentDecks[idx] = newName;
            appData.battles.forEach(b => {
                if (b.opponentDeck === oldName) b.opponentDeck = newName;
            });
            saveData();
        }

        function deleteOpponentDeck(name) {
            appData.opponentDecks = appData.opponentDecks.filter(d => d !== name);
            appData.battles = appData.battles.filter(b => b.opponentDeck !== name);
            saveData();
        }

        function addEvent(name) {
            if (appData.events.includes(name)) return false;
            appData.events.push(name);
            saveData();
            return true;
        }

        function updateEvent(oldName, newName) {
            const idx = appData.events.indexOf(oldName);
            if (idx === -1) return;
            appData.events[idx] = newName;
            appData.battles.forEach(b => {
                if (b.event === oldName) b.event = newName;
            });
            saveData();
        }

        function deleteEvent(name) {
            appData.events = appData.events.filter(e => e !== name);
            appData.battles = appData.battles.filter(b => b.event !== name);
            saveData();
        }

        function exportData() {
            return JSON.stringify(appData, null, 2);
        }

        function importData(jsonStr) {
            try {
                const data = JSON.parse(jsonStr);
                if (!data.battles || !data.myDecks || !data.opponentDecks || !data.events) {
                    return false;
                }
                appData = data;
                saveData();
                return true;
            } catch (e) {

            btn.addEventListener('click', function(e) {

        // ============================================================
        // 工具函式
        // ============================================================
        function showLoading() { loadingOverlay.classList.add('active'); }

        function hideLoading() { loadingOverlay.classList.remove('active'); }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            return `${parts[0]}/${parts[1]}/${parts[2]}`;
        }

        function setDefaultDate() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            battleDate.value = `${y}-${m}-${d}`;
        }

        function getTagClass(tag) {
            if (!tag) return '';
            const map = { '手氣好順': 'tag-luck-good', '手氣好差': 'tag-luck-bad', '好有挑戰性': 'tag-challenge', '克屬': 'tag-weakness' };
            return map[tag] || '';
        }

        function tagsToString(tags) {
            return tags && tags.length > 0 ? tags.join(',') : null;
        }

        function stringToTags(str) {
            if (!str) return [];
            return str.split(',').filter(t => t.trim() !== '');
        }

        function getAvailableYears() {
            const years = new Set();
            battles.forEach(b => {
                if (b.date) {
                    const year = b.date.substring(0, 4);
                    years.add(year);
                }
            });
            return Array.from(years).sort().reverse();
        }

        function getAvailableMonthsForYear(year) {
            const months = new Set();
            battles.forEach(b => {
                if (b.date && b.date.startsWith(year)) {
                    const month = b.date.substring(5, 7);
                    months.add(month);
                }
            });
            return Array.from(months).sort();
        }

        function updateYearOptions() {
            const currentVal = filterYearSelect.value;
            const years = getAvailableYears();
            filterYearSelect.innerHTML = '<option value="">全部年份</option>';
            years.forEach(year => {
                const opt = document.createElement('option');
                opt.value = year;
                opt.textContent = year + ' 年';
                filterYearSelect.appendChild(opt);
            });
            if (years.includes(currentVal)) filterYearSelect.value = currentVal;
            else filterYearSelect.value = '';
            updateMonthOptions();
        }

        function updateMonthOptions() {
            const selectedYear = filterYearSelect.value;
            filterMonthSelect.innerHTML = '<option value="">全部月份</option>';
            if (selectedYear) {
                filterMonthSelect.disabled = false;
                const months = getAvailableMonthsForYear(selectedYear);
                const monthNames = { '01': '1月', '02': '2月', '03': '3月', '04': '4月', '05': '5月', '06': '6月', '07': '7月',
                    '08': '8月', '09': '9月', '10': '10月', '11': '11月', '12': '12月' };
                months.forEach(month => {
                    const opt = document.createElement('option');
                    opt.value = month;
                    opt.textContent = monthNames[month] || month + '月';
                    filterMonthSelect.appendChild(opt);
                });
                filterMonthSelect.value = '';
            } else {

            }

        // ============================================================
        // 同步下拉選單

                });

        function syncEventSelect() {
            const currentVal = eventType.value;
            eventType.innerHTML = '';

        // ============================================================
        // 更新統計顯示
        // ============================================================
        function updateStatsDisplay() {
            const total = battles.length;
            const wins = battles.filter(b => b.result === 'win').length;
            const totalRate = total === 0 ? 0 : Math.round((wins / total) * 100);
            totalMatchesDisplay.textContent = total;
            totalWinRateDisplay.textContent = totalRate + '%';
            totalWinRateBadge.innerHTML = `<i class="fas fa-trophy" style="color:#d4a13e;"></i> ${totalRate}%`;
        }

        // ============================================================
        // 計算我的牌組勝率
        // ============================================================
        function computeDeckStats() {
            const deckMap = {};
            myDecks.forEach(deck => {
                deckMap[deck] = {
                    total: 0,
                    wins: 0,
                    losses: 0,
                    draws: 0,
                    first: { total: 0, wins: 0, losses: 0, draws: 0 },
                    last: { total: 0, wins: 0, losses: 0, draws: 0 }
                };
            });
            battles.forEach(b => {
                const deck = b.myTeam;
                if (deckMap[deck]) {
                    deckMap[deck].total++;
                    if (b.result === 'win') deckMap[deck].wins++;
                    else if (b.result === 'lose') deckMap[deck].losses++;
                    else if (b.result === 'draw') deckMap[deck].draws++;

                    if (b.turn === 'first') {
                        deckMap[deck].first.total++;
                        if (b.result === 'win') deckMap[deck].first.wins++;
                        else if (b.result === 'lose') deckMap[deck].first.losses++;
                        else if (b.result === 'draw') deckMap[deck].first.draws++;
                    } else if (b.turn === 'last') {
                        deckMap[deck].last.total++;
                        if (b.result === 'win') deckMap[deck].last.wins++;
                        else if (b.result === 'lose') deckMap[deck].last.losses++;
                        else if (b.result === 'draw') deckMap[deck].last.draws++;
                    }
                }
            });
            return deckMap;
        }

        // ============================================================
        // 渲染牌組勝率
        // ============================================================
        function renderDeckStats() {
            const stats = computeDeckStats();
            const hasData = myDecks.some(deck => stats[deck] && stats[deck].total > 0);

            if (!hasData) {
                myDeckStatsListEl.innerHTML =
                    `<div class="empty-state" style="padding:0.8rem 0; font-size:0.85rem;"><i class="fas fa-chart-pie" style="font-size:1.2rem;"></i>尚無數據</div>`;
                return;
            }

            const sortedDecks = [...myDecks].filter(deck => stats[deck] && stats[deck].total > 0);

            if (currentChart === 'list') {
                let html = '';
                sortedDecks.forEach(deck => {
                    const stat = stats[deck];
                    const drawText = stat.draws > 0 ? `-${stat.draws}` : '';
                    html += `<div class="my-deck-row">
                            <span class="my-deck-name">${deck}</span>
                            <span class="my-deck-record"><span class="wins">${stat.wins}</span>-<span class="losses">${stat.losses}</span>${drawText}</span>
                        </div>`;
                });
                myDeckStatsListEl.innerHTML = html;
                return;
            }

            if (currentChart === 'grouped') {
                let html = '<div class="chart-grouped-bars">';

                html += `<div class="grouped-bar-legend">
                        <span><span class="dot dot-first"></span> 先攻勝率</span>
                        <span><span class="dot dot-last"></span> 後攻勝率</span>
                        <span><span class="dot dot-total"></span> 總勝率</span>
                    </div>`;

                sortedDecks.forEach(deck => {
                    const stat = stats[deck];
                    const first = stat.first;
                    const last = stat.last;

                    const validGames = stat.total - stat.draws;
                    const winRate = validGames > 0 ? Math.round((stat.wins / validGames) * 100) : 0;

                    const firstValid = first.total - first.draws;
                    const firstWinRate = firstValid > 0 ? Math.round((first.wins / firstValid) * 100) : 0;

                    const lastValid = last.total - last.draws;
                    const lastWinRate = lastValid > 0 ? Math.round((last.wins / lastValid) * 100) : 0;

                    const firstPercent = stat.total > 0 ? Math.round((first.total / stat.total) * 100) : 0;
                    const lastPercent = stat.total > 0 ? Math.round((last.total / stat.total) * 100) : 0;

                    let analysis = '';
                    if (first.total > 0 && last.total > 0) {
                        const diff = firstWinRate - lastWinRate;
                        if (diff >= 15) analysis = '🔥 極度依賴先手';
                        else if (diff <= -15) analysis = '🛡️ 擅長後手反擊';
                        else if (Math.abs(diff) < 15) analysis = '⚖️ 彈性高';
                    } else if (first.total > 0 && last.total === 0) {
                        analysis = '📌 僅先攻數據';
                    } else if (last.total > 0 && first.total === 0) {
                        analysis = '📌 僅後攻數據';
                    }

                    html += `
                            <div class="grouped-bar-row">
                                <span class="grouped-bar-label">${deck}</span>
                                <div class="grouped-bar-stats">
                                    <div class="grouped-bar-stat-row">
                                        <span class="stat-label">總勝率</span>
                                        <div class="grouped-bar-track">
                                            <div class="grouped-bar-fill total-fill" style="width:${winRate}%;"></div>
                                        </div>
                                        <span class="grouped-bar-percent">${winRate}%</span>
                                    </div>
                                    <div class="grouped-bar-stat-row">
                                        <span class="stat-label">先攻勝率</span>
                                        <div class="grouped-bar-track">
                                            <div class="grouped-bar-fill first-fill" style="width:${firstWinRate}%;"></div>
                                        </div>
                                        <span class="grouped-bar-percent">${firstWinRate}%</span>
                                    </div>
                                    <div class="grouped-bar-stat-row">
                                        <span class="stat-label">後攻勝率</span>
                                        <div class="grouped-bar-track">
                                            <div class="grouped-bar-fill last-fill" style="width:${lastWinRate}%;"></div>
                                        </div>
                                        <span class="grouped-bar-percent">${lastWinRate}%</span>
                                    </div>
                                    <div class="grouped-bar-summary">
                                        總勝率 <strong>${winRate}%</strong> · 先攻佔 ${firstPercent}% (勝率 ${firstWinRate}%) · 後攻佔 ${lastPercent}% (勝率 ${lastWinRate}%) 
                                        ${analysis ? ` · ${analysis}` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                });

                html += '</div>';
                myDeckStatsListEl.innerHTML = html;
                return;
            }

            if (currentChart === 'pie') {
                const colors = ['#FF6B6B', '#FFB347', '#FFD93D', '#6BCB77', '#4ECDC4', '#45B7D1', '#FF8C42', '#FF6B6B'];
                const total = sortedDecks.reduce((sum, d) => sum + stats[d].total, 0);

                let pieSegments = '';
                let legendHtml = '';
                let currentAngle = 0;
                const centerX = 75,
                    centerY = 75,
                    radius = 65;

                sortedDecks.forEach((deck, index) => {
                    const stat = stats[deck];
                    const percentage = total > 0 ? (stat.total / total) * 100 : 0;
                    const angle = (percentage / 100) * 360;
                    const color = colors[index % colors.length];
                    const startAngle = currentAngle;
                    const endAngle = currentAngle + angle;
                    currentAngle = endAngle;

                    const radStart = (startAngle - 90) * Math.PI / 180;
                    const radEnd = (endAngle - 90) * Math.PI / 180;
                    const x1 = centerX + radius * Math.cos(radStart);
                    const y1 = centerY + radius * Math.sin(radStart);
                    const x2 = centerX + radius * Math.cos(radEnd);
                    const y2 = centerY + radius * Math.sin(radEnd);
                    const largeArc = angle > 180 ? 1 : 0;

                    const drawText = stat.draws > 0 ? `-${stat.draws}` : '';

                    if (angle > 0.5) {
                        pieSegments +=
                            `<path d="M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${color}" stroke="white" stroke-width="2"/>`;
                    }

                    legendHtml += `
                            <div class="chart-pie-legend-item">
                                <span class="color-dot" style="background:${color};"></span>
                                <span class="legend-label">${deck}</span>
                                <span class="legend-value">${stat.wins}-${stat.losses}${drawText}</span>
                            </div>
                        `;
                });

                const avgRate = sortedDecks.length > 0 ? Math.round(sortedDecks.reduce((sum, d) => {
                    const stat = stats[d];
                    const valid = stat.total - stat.draws;
                    return sum + (valid > 0 ? (stat.wins / valid) * 100 : 0);
                }, 0) / sortedDecks.length) : 0;

                myDeckStatsListEl.innerHTML = `
                        <div class="chart-pie-wrapper">
                            <div class="chart-pie-container">
                                <svg class="chart-pie" viewBox="0 0 150 150">
                                    ${pieSegments}
                                    <circle cx="75" cy="75" r="32" fill="white" stroke="#eef2f8" stroke-width="1"/>
                                </svg>
                                <div class="chart-pie-center">
                                    <span class="total">${total}</span>
                                    <span class="label">總場次</span>
                                </div>
                            </div>
                            <div class="chart-pie-legend">
                                ${legendHtml}
                                <div style="margin-top:0.3rem; font-size:0.65rem; color:#6f7d93; border-top:1px solid #eef2f8; padding-top:0.3rem;">
                                    平均勝率：${avgRate}%
                                </div>
                            </div>
                        </div>
                    `;
            }
        }

        function renderBattleItem(b, isCompact = false) {
            const resultClass = b.result;
            const resultIcon = b.result === 'win' ? 'fa-check-circle' : (b.result === 'lose' ? 'fa-times-circle' :
                'fa-minus-circle');
            const resultText = b.result === 'win' ? '嬴' : (b.result === 'lose' ? '輸' : '和');

            const deleteAttr = isCompact ?
                `onclick="deleteBattleFromAll(${b.id})"` :
                `onclick="deleteBattle(${b.id})"`;

            let turnHtml = '';
            if (b.turn === 'first') {
                turnHtml = ' <span class="turn-badge first">⚔️ 先攻</span>';
            } else if (b.turn === 'last') {
                turnHtml = ' <span class="turn-badge last">🛡️ 後攻</span>';
            }

            let noteHtml = '';
            if (b.note) {
                const noteEscaped = b.note.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                noteHtml =
                    ` <span class="note-full"><i class="fas fa-pen" style="font-size:0.6rem; margin-right:4px;"></i> ${noteEscaped}</span>`;
            }

            let tagHtml = '';
            const tags = stringToTags(b.tag);
            if (tags.length > 0) {
                const tagSpans = tags.map(tag => {
                    const tagClass = getTagClass(tag);
                    const tagEscaped = tag.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return `<span class="result-tag ${tagClass}">#${tagEscaped}</span>`;
                }).join(' ');
                tagHtml = tagSpans;
            }

            const vsDisplay = `${b.myTeam} VS ${b.opponentDeck}`;

            if (isCompact) {
                return `
                        <div class="all-battle-item ${resultClass}">
                            <div class="all-battle-meta">

                                    <span class="result ${resultClass}"><i class="fas ${resultIcon}"></i> ${resultText}</span>

                                <i class="fas fa-trash-alt" ${deleteAttr} title="刪除"></i>
                            </div>

                    <div class="battle-item ${resultClass}">
                        <div class="battle-info">
                            <div class="result-line">
                                <span class="result ${resultClass}"><i class="fas ${resultIcon}"></i> ${resultText}</span>
                                ${turnHtml}
                                ${tagHtml}
                            </div>

                                <span><i class="far fa-calendar-alt"></i> ${formatDate(b.date)}</span>

        function getFilteredBattles() {
            let filtered = [...battles];
            if (filterYear) {
                filtered = filtered.filter(b => b.date && b.date.startsWith(filterYear));
            }
            if (filterMonth && filterYear) {
                filtered = filtered.filter(b => b.date && b.date.substring(5, 7) === filterMonth);
            }
            if (filterTag) {
                filtered = filtered.filter(b => {
                    const tags = stringToTags(b.tag);
                    return tags.includes(filterTag);
                });
            }
            if (filterDeck) {
                filtered = filtered.filter(b => b.myTeam === filterDeck);
            }
            return filtered;
        }

        // ============================================================
        // 分享功能

        function getSharePieSVG() {
            const stats = computeDeckStats();
            const sortedDecks = [...myDecks].filter(deck => stats[deck] && stats[deck].total > 0);
            const total = sortedDecks.reduce((sum, d) => sum + stats[d].total, 0);
            if (total === 0) return '<div style="text-align:center;color:#8a9bb0;font-size:0.8rem;">尚無數據</div>';

            const colors = ['#FF6B6B', '#FFB347', '#FFD93D', '#6BCB77', '#4ECDC4', '#45B7D1', '#FF8C42', '#FF6B6B'];
            let segments = '';
            let currentAngle = 0;
            const centerX = 50,
                centerY = 50,
                radius = 45;

            sortedDecks.forEach((deck, index) => {
                const stat = stats[deck];
                const percentage = total > 0 ? (stat.total / total) * 100 : 0;
                const angle = (percentage / 100) * 360;
                const color = colors[index % colors.length];
                const startAngle = currentAngle;
                const endAngle = currentAngle + angle;
                currentAngle = endAngle;

                const radStart = (startAngle - 90) * Math.PI / 180;
                const radEnd = (endAngle - 90) * Math.PI / 180;
                const x1 = centerX + radius * Math.cos(radStart);
                const y1 = centerY + radius * Math.sin(radStart);
                const x2 = centerX + radius * Math.cos(radEnd);
                const y2 = centerY + radius * Math.sin(radEnd);
                const largeArc = angle > 180 ? 1 : 0;

                if (angle > 0.5) {
                    segments +=
                        `<path d="M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${color}" stroke="white" stroke-width="2"/>`;
                }
            });

            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    ${segments}
                    <circle cx="50" cy="50" r="20" fill="white" stroke="#eef2f8" stroke-width="1.5"/>
                    <text x="50" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#1a2639">${total}</text>
                    <text x="50" y="58" text-anchor="middle" font-size="6" fill="#6f7d93">場次</text>
                </svg>`;
        }

        function getShareLegend() {
            const stats = computeDeckStats();
            const sortedDecks = [...myDecks].filter(deck => stats[deck] && stats[deck].total > 0);
            const colors = ['#FF6B6B', '#FFB347', '#FFD93D', '#6BCB77', '#4ECDC4', '#45B7D1', '#FF8C42', '#FF6B6B'];
            let html = '';
            sortedDecks.forEach((deck, index) => {
                const stat = stats[deck];
                const drawText = stat.draws > 0 ? `-${stat.draws}` : '';
                html += `
                        <div class="legend-item">
                            <span class="color-box" style="background:${colors[index % colors.length]};"></span>
                            <span>${deck}</span>
                            <span class="legend-value">${stat.wins}-${stat.losses}${drawText}</span>
                        </div>
                    `;
            });
            return html;
        }

        function getAvgRate() {
            const stats = computeDeckStats();
            const sortedDecks = [...myDecks].filter(deck => stats[deck] && stats[deck].total > 0);
            if (sortedDecks.length === 0) return 0;
            const avg = sortedDecks.reduce((sum, d) => {
                const stat = stats[d];
                const valid = stat.total - stat.draws;
                return sum + (valid > 0 ? (stat.wins / valid) * 100 : 0);
            }, 0) / sortedDecks.length;
            return Math.round(avg);
        }

                    battlesHtml += `
                            <div class="share-battle-item">
                                <span class="result-badge ${resultClass}">${resultText}</span>
                                <span>${formatDate(b.date)}</span>
                                ${turnText ? `<span class="turn-tag">${turnText}</span>` : ''}
                                <span>${b.myTeam} vs ${b.opponentDeck}</span>
                                ${tagHtml}
                            </div>
                        `;
                });
            }
            document.getElementById('shareCaptureBattles').innerHTML = battlesHtml;

            document.getElementById('shareCapturePie').innerHTML = getSharePieSVG();
            document.getElementById('shareCaptureLegend').innerHTML = getShareLegend();
            document.getElementById('shareAvgRate').textContent = `平均勝率：${getAvgRate()}%`;
        }

        let currentImageData = null;

        async function generateAndShowShareImage() {
            shareResultImg.style.display = 'none';
            shareImageOverlay.classList.add('active');

            buildShareContent();
            await new Promise(resolve => setTimeout(resolve, 100));

            const captureArea = document.getElementById('shareCaptureArea');
            captureArea.style.opacity = '1';
            captureArea.style.zIndex = '1000';
            captureArea.style.position = 'fixed';
            captureArea.style.left = '50%';
            captureArea.style.top = '50%';
            captureArea.style.transform = 'translate(-50%, -50%)';
            captureArea.style.pointerEvents = 'none';

            try {
                const canvas = await html2canvas(captureArea, {
                    scale: 2,
                    backgroundColor: '#f8faff',
                    useCORS: true,
                    logging: false,
                    width: 650,
                    height: captureArea.scrollHeight
                });

                captureArea.style.opacity = '0';
                captureArea.style.zIndex = '-1';
                captureArea.style.position = 'fixed';
                captureArea.style.left = '-9999px';
                captureArea.style.top = '0';
                captureArea.style.transform = 'none';
                captureArea.style.pointerEvents = 'none';

                currentImageData = canvas.toDataURL('image/png');
                shareResultImg.src = currentImageData;
                shareResultImg.style.display = 'block';

            } catch (error) {
                console.error('生成圖片失敗:', error);
                shareResultImg.style.display = 'none';
                alert('生成圖片失敗，請重試');
                shareImageOverlay.classList.remove('active');
                captureArea.style.opacity = '0';
                captureArea.style.zIndex = '-1';
                captureArea.style.position = 'fixed';
                captureArea.style.left = '-9999px';
                captureArea.style.top = '0';
                captureArea.style.transform = 'none';
                captureArea.style.pointerEvents = 'none';
            }
        }

        shareBtn.addEventListener('click', function() {
            generateAndShowShareImage();
        });

        shareImageOverlay.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        downloadShareImgBtn.addEventListener('click', function() {
            if (currentImageData) {
                const link = document.createElement('a');
                link.download =
                    `PokemonCardGames_分享_${username}_${new Date().toISOString().slice(0,10)}.png`;
                link.href = currentImageData;
                link.click();
            }
        });

        // ============================================================
        // 備份/還原
        // ============================================================
        exportDbBtn.addEventListener('click', function() {
            const data = exportData();
            if (!data) {
                alert('無資料可匯出');
                return;
            }
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `pokemon_battle_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        });

        importDbBtn.addEventListener('click', function() {
            restoreFileInput.click();
        });

        restoreFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = event.target.result;
                if (importData(data)) {
                    loadDataFromStorage();
                    alert('資料匯入成功！');
                } else {
                    alert('匯入失敗，請確認檔案格式正確');
                }
                restoreFileInput.value = '';
            };
            reader.readAsText(file);
        });

        // ============================================================
        // 儲存對戰記錄（儲存後清空對手、結果、先後攻、標籤、備註）
        // ============================================================
        document.getElementById('saveBattleBtn').addEventListener('click', function() {
            const date = battleDate.value;
            const myTeamVal = myDeckSelector.value;
            const eventVal = eventType.value;
            const opponentDeckVal = opponentDeckSelect.value;
            const turn = selectedTurn;
            const note = battleNote.value.trim();
            const tag = tagsToString(selectedTags);

            if (!date) { alert('請選擇日期'); return; }
            if (!myTeamVal || myTeamVal === '請先新增牌組') { alert('請選擇或新增一個牌組'); return; }
            if (!eventVal || eventVal === '請先新增賽事') { alert('請選擇賽事'); return; }
            if (!opponentDeckVal || opponentDeckVal === '請先新增對手牌組') { alert('請選擇對手牌組'); return; }
            if (!selectedResult) { alert('請選擇結果'); return; }
            if (!turn) { alert('請選擇先攻或後攻'); return; }

            addBattle({ date, result: selectedResult, myTeam: myTeamVal, event: eventVal, opponentDeck: opponentDeckVal,
                note, tag, turn });
            
            // 重新載入資料
            loadDataFromStorage();
            
            // 清空對手牌組、結果、先後攻、標籤、備註
            // 對手牌組：重置為第一個選項
            if (opponentDecks.length > 0) {
                opponentDeckSelect.value = opponentDecks[0];
            } else {
                opponentDeckSelect.value = '';
            }
            
            // 結果：重置為「輸」（預設）
            resultBtnGroup.querySelectorAll('.result-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.result === 'lose') {
                    b.classList.add('active');
                    selectedResult = 'lose';
                    lastSelectedResult = 'lose';
                }
            });
            
            // 先後攻：取消選擇
            turnBtnGroup.querySelectorAll('.turn-btn').forEach(b => {
                b.classList.remove('active-first', 'active-last');
            });
            selectedTurn = '';
            lastSelectedTurn = '';
            
            // 標籤：清除所有
            tagSelectGroup.querySelectorAll('.tag-select-btn').forEach(b => b.classList.remove('active'));
            selectedTags = [];
            
            // 備註：清空
            battleNote.value = '';
            
            // 日期保留為今天
            setDefaultDate();
        });

        // ============================================================
        // 新增牌組（主介面）
        // ============================================================
        addDeckBtn.addEventListener('click', function() {
            newDeckName.value = '';
            addDeckModal.classList.add('active');
            setTimeout(() => newDeckName.focus(), 100);
        });

        cancelDeckBtn.addEventListener('click', function() {
            addDeckModal.classList.remove('active');
            newDeckName.value = '';
        });

        confirmDeckBtn.addEventListener('click', function() {
            const name = newDeckName.value.trim();
            if (!name) { alert('請輸入牌組名稱'); return; }
            if (myDecks.includes(name)) { alert('這個牌組已經存在了'); return; }
            if (addMyDeck(name)) {
                loadDataFromStorage();
                newDeckName.value = '';
                addDeckModal.classList.remove('active');
            } else {
                alert('新增牌組失敗');
            }
        });

        newDeckName.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                confirmDeckBtn.click(); }
            if (e.key === 'Escape') { addDeckModal.classList.remove('active');
                newDeckName.value = ''; }
        });

        addDeckModal.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
                newDeckName.value = '';
            }
        });

        // ============================================================
        // 顯示全部記錄
        // ============================================================
        showAllBtn.addEventListener('click', function() {
            filterYear = '';
            filterMonth = '';
            filterTag = '';
            filterDeck = '';
            filterYearSelect.value = '';
            filterMonthSelect.value = '';
            filterTagSelect.value = '';
            filterDeckSelect.value = '';
            updateMonthOptions();
            renderAllRecords();
            allRecordsModal.classList.add('active');
        });

        closeAllModal.addEventListener('click', function() { allRecordsModal.classList.remove('active'); });
        allRecordsModal.addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('active'); } });

        // ============================================================
        // 篩選事件
        // ============================================================
        filterYearSelect.addEventListener('change', function() {
            filterYear = this.value;
            updateMonthOptions();
            if (!filterYear) filterMonth = '';
            else filterMonth = filterMonthSelect.value;
            renderAllRecords();
        });

        filterMonthSelect.addEventListener('change', function() {
            filterMonth = this.value;
            renderAllRecords();
        });

        filterTagSelect.addEventListener('change', function() {
            filterTag = this.value;
            renderAllRecords();
        });

        filterDeckSelect.addEventListener('change', function() {
            filterDeck = this.value;
            renderAllRecords();
        });

        filterResetBtn.addEventListener('click', function() {
            filterYear = '';
            filterMonth = '';
            filterTag = '';
            filterDeck = '';
            filterYearSelect.value = '';
            filterMonthSelect.value = '';
            filterTagSelect.value = '';
            filterDeckSelect.value = '';
            updateMonthOptions();
            renderAllRecords();
        });

        // ============================================================
        // 使用者名稱
        // ============================================================
        usernameInput.addEventListener('change', function() {
            const newName = this.value.trim() || '使用者';
            setUsername(newName);
            username = newName;
        });

        usernameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
        usernameInput.addEventListener('focus', function() { this.select(); });

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            showLoading();
            try {
                loadData();
                battles = getBattles();
                myDecks = getMyDecks();
                opponentDecks = getOpponentDecks();
                eventTypes = getEvents();
                username = getUsername();

                usernameInput.value = username;
                syncDeckSelectors();
                syncOpponentSelect();
                syncEventSelect();
                setDefaultDate();
                updateYearOptions();
                updateFilterDeckOptions();

                resultBtnGroup.querySelectorAll('.result-btn').forEach(b => {
                    b.classList.remove('active');
                    if (b.dataset.result === lastSelectedResult) {
                        b.classList.add('active');
                        selectedResult = lastSelectedResult;
                    }
                });
                turnBtnGroup.querySelectorAll('.turn-btn').forEach(b => {
                    b.classList.remove('active-first', 'active-last');
                    if (b.dataset.turn === lastSelectedTurn) {
                        if (lastSelectedTurn === 'first') {
                            b.classList.add('active-first');
                        } else if (lastSelectedTurn === 'last') {
                            b.classList.add('active-last');
                        }
                        selectedTurn = lastSelectedTurn;
                    }
                });
                if (lastEventType && eventTypes.includes(lastEventType)) {
                    eventType.value = lastEventType;
                }

                refreshUI();
                hideLoading();
            } catch (error) {
                console.error('初始化失敗:', error);
                battleListEl.innerHTML =
                    `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#dc3545;"></i>初始化失敗<br><span style="font-size:0.8rem;">${error.message}</span></div>`;
                hideLoading();
            }
        }

        init();

        // ============================================================
        // 快捷鍵：Enter 儲存
        // ============================================================
        document.querySelectorAll('#battleDate, #eventType, #opponentDeck, #battleNote').forEach(el => {
            el.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('saveBattleBtn').click();
                }
            });
        });
    </script>
</body>
</html>
